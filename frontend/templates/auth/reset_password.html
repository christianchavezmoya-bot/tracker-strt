<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — HOLO-RTLS</title>
  <link rel="stylesheet" href="/static/css/dashboard-theme.css?v=7">
  <link rel="stylesheet" href="/static/css/shell.css?v=7">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body.reset-body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg-primary, #1c1c1e);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      color: #f5f5f7;
    }
    .reset-card {
      width: min(420px, 92vw);
      padding: 32px 28px;
      border: 1px solid rgba(148,163,184,.2);
      background: rgba(15,23,42,.88);
      backdrop-filter: blur(8px);
    }
    .reset-card h1 {
      font-family: "Space Grotesk", sans-serif;
      font-size: 1.6rem;
      margin: 0 0 8px;
      letter-spacing: .02em;
    }
    .reset-card p { color: #94a3b8; margin: 0 0 20px; font-size: .95rem; }
    .reset-card label { display:block; font-size:.8rem; color:#94a3b8; margin: 12px 0 6px; }
    .reset-card input {
      width: 100%; box-sizing: border-box; padding: 10px 12px;
      border: 1px solid rgba(148,163,184,.25); background: #0b1220; color: #e2e8f0;
    }
    .reset-card button {
      margin-top: 18px; width: 100%; padding: 12px;
      border: 0; background: #2dd4bf; color: #0b1220; font-weight: 700; cursor: pointer;
      font-family: "Space Grotesk", sans-serif;
    }
    .msg { margin-top: 14px; font-size: .9rem; }
    .msg.ok { color: #2dd4bf; }
    .msg.err { color: #f87171; }
    .brand { font-family: "Space Grotesk", sans-serif; color: #2dd4bf; margin-bottom: 18px; font-weight: 700; }
  </style>
</head>
<body class="reset-body">
  <div class="reset-card">
    <div class="brand">◈ HOLO-RTLS</div>
    <h1>Reset password</h1>
    <p>Paste the reset token from your email (or debug link) and choose a new password.</p>
    <label for="token">Reset token</label>
    <input id="token" autocomplete="off">
    <label for="pw">New password</label>
    <input id="pw" type="password" minlength="8" autocomplete="new-password">
    <label for="pw2">Confirm password</label>
    <input id="pw2" type="password" minlength="8" autocomplete="new-password">
    <button id="btn">Update password</button>
    <div class="msg" id="msg"></div>
    <p style="margin-top:18px"><a href="/login" style="color:#2dd4bf">Back to login</a></p>
  </div>
  <script src="/static/js/api.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    if (params.get('token')) document.getElementById('token').value = params.get('token');
    document.getElementById('btn').onclick = async () => {
      const token = document.getElementById('token').value.trim();
      const pw = document.getElementById('pw').value;
      const pw2 = document.getElementById('pw2').value;
      const msg = document.getElementById('msg');
      msg.className = 'msg';
      if (!token || !pw) { msg.textContent = 'Token and password required'; msg.classList.add('err'); return; }
      if (pw !== pw2) { msg.textContent = 'Passwords do not match'; msg.classList.add('err'); return; }
      if (pw.length < 8) { msg.textContent = 'Password must be at least 8 characters'; msg.classList.add('err'); return; }
      const res = await fetch('/api/auth/password/reset', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, new_password: pw })
      });
      const data = await res.json();
      if (res.ok) {
        msg.textContent = 'Password updated. Redirecting to login…';
        msg.classList.add('ok');
        setTimeout(() => location.href = '/login', 1200);
      } else {
        msg.textContent = data.error || 'Reset failed';
        msg.classList.add('err');
      }
    };
  </script>
</body>
</html>
