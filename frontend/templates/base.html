<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}HOLO-RTLS{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/dashboard-theme.css?v=7">
  <link rel="stylesheet" href="/static/css/shell.css?v=7">
  <link rel="stylesheet" href="/static/css/tablet.css?v=7">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#1c1c1e">
  {% block head %}{% endblock %}
</head>
<body class="shell-page {% block body_class %}{% endblock %}">
<a class="skip-link" href="#main-content">Skip to content</a>
<header class="topbar shell-topbar">
  <div class="topbar-left">
    <a href="/" class="brand"><div class="brand-icon" aria-hidden="true">◈</div><span class="brand-name">HOLO-RTLS</span></a>
    <div class="breadcrumb">{% block breadcrumb %}{% endblock %}</div>
  </div>
  <div class="topbar-right">
    <div id="backendHealthBadge" class="backend-health backend-health-pending" role="status" aria-live="polite">
      <button type="button" class="backend-health-btn" id="backendHealthBtn" title="Check backend status now">
        <span class="backend-health-dot" aria-hidden="true"></span>
        <span id="backendHealthLabel">Backend: checking</span>
      </button>
      <span class="backend-health-meta" id="backendHealthMeta">Waiting for first probe</span>
    </div>
    {% block topbar_actions %}{% endblock %}
  </div>
</header>
<main class="shell-main" id="main-content" tabindex="-1">
  {% block content %}{% endblock %}
</main>
<script src="/static/js/api.js"></script>
<script src="/static/js/nav.js" defer></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/static/sw.js?v=8').catch(() => {}));
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
