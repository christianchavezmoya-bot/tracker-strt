<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Users — HOLO-RTLS</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="stylesheet" href="/static/css/auth.css">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="auth-page">
  <div class="auth-bg">
    <div class="auth-grid-overlay"></div>
    <div class="auth-glow auth-glow-1"></div>
  </div>
  <div class="auth-container" style="max-width:700px">
    <div class="auth-brand" style="margin-bottom:16px">
      <div class="auth-logo">◈</div>
      <h1 class="auth-title" style="font-size:18px">Users</h1>
      <p class="auth-subtitle">Implementation in progress — Phase 2+</p>
    </div>
    <div class="auth-card" style="text-align:center">
      <div style="font-size:48px;color:var(--cyan);margin:20px 0">
        <i class="fa-solid fa-hard-hat"></i>
      </div>
      <p style="color:var(--text-muted);margin-bottom:20px">
        This page is a placeholder.<br>
        It will be implemented in <strong>Phase 2–5</strong> of the build plan.
      </p>
      <a href="/" class="btn btn-primary">← Back to Command Center</a>
    </div>
    <p class="auth-footer" style="margin-top:16px">
      See <strong>BUILD_PLAN.md</strong> for the full roadmap.
    </p>
  </div>
  <script src="/static/js/api.js"></script>
  <script>
    if (!API.isLoggedIn()) window.location.href = '/login';
    document.addEventListener('DOMContentLoaded', () => {
      const user = API.getUser();
      if (user) document.title = user.display_name + ' — HOLO-RTLS';
    });
  </script>
</body>
</html>
