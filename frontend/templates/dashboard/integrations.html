<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Integrations — HOLO-RTLS</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="stylesheet" href="/static/css/shell.css">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="shell-page">
<header class="topbar shell-topbar">
  <div class="topbar-left">
    <a href="/" class="brand"><div class="brand-icon">◈</div><span class="brand-name">HOLO-RTLS</span></a>
    <div class="breadcrumb"><span>Integrations</span></div>
  </div>
</header>
<main class="shell-main">
  <div class="page-header">
    <div>
      <h1 class="page-title">Integrations</h1>
      <p class="page-subtitle">API keys for scanners, MES, and external systems</p>
    </div>
    <button class="btn btn-primary" id="btnCreate"><i class="fa-solid fa-plus"></i> Create API key</button>
  </div>
  <div class="table-panel">
    <table class="data-table">
      <thead><tr><th>Name</th><th>Prefix</th><th>Status</th><th>Last used</th><th>Created</th><th></th></tr></thead>
      <tbody id="keysBody"><tr><td colspan="6" class="empty-cell">Loading…</td></tr></tbody>
    </table>
  </div>
  <p id="secretBanner" class="form-error" style="color:var(--accent);margin-top:16px" hidden></p>
</main>
<script src="/static/js/api.js"></script>
<script src="/static/js/nav.js" defer></script>
<script>
if (!API.isLoggedIn()) location.href='/login';
async function load() {
  const res = await API.get('/keys');
  const data = await res.json();
  const items = data.items || [];
  const body = document.getElementById('keysBody');
  if (!items.length) {
    body.innerHTML = '<tr><td colspan="6" class="empty-cell">No API keys yet</td></tr>';
    return;
  }
  body.innerHTML = items.map(k => `<tr>
    <td><strong>${k.name}</strong></td>
    <td class="mono">${k.key_prefix}…</td>
    <td><span class="chip">${k.is_active ? 'Active' : 'Revoked'}</span></td>
    <td>${k.last_used_at || '—'}</td>
    <td>${(k.created_at||'').slice(0,10)}</td>
    <td class="row-actions">
      <button class="icon-btn" title="Rotate" onclick="rotateKey(${k.id})"><i class="fa-solid fa-rotate"></i></button>
      <button class="icon-btn danger" title="Revoke" onclick="revokeKey(${k.id})"><i class="fa-solid fa-ban"></i></button>
    </td>
  </tr>`).join('');
}
document.getElementById('btnCreate').onclick = async () => {
  const name = prompt('Key name', 'Scanner / MES');
  if (!name) return;
  const res = await API.post('/keys', { name });
  const data = await res.json();
  if (data.key && data.key.secret) {
    const b = document.getElementById('secretBanner');
    b.hidden = false;
    b.textContent = 'Copy now (shown once): ' + data.key.secret;
  }
  load();
};
async function revokeKey(id) {
  if (!confirm('Revoke this key?')) return;
  await API.del('/keys/' + id);
  load();
}
async function rotateKey(id) {
  const res = await API.post('/keys/' + id + '/rotate', {});
  const data = await res.json();
  if (data.key && data.key.secret) {
    const b = document.getElementById('secretBanner');
    b.hidden = false;
    b.textContent = 'New secret (shown once): ' + data.key.secret;
  }
  load();
}
load();
</script>
</body>
</html>
