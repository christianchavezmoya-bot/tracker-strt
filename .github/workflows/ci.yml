name: CI

on:
  push:
    branches: [master, 'cursor/**']
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        env:
          SECRET_KEY: ci-secret-key-for-testing-only-32chars
          JWT_SECRET_KEY: ci-jwt-secret-key-for-testing-only-32chars
          FLASK_DEBUG: '1'
        run: pytest tests/ -q --ignore=tests/e2e
